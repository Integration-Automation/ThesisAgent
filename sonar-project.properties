# SonarCloud analysis scope for ThesisAgents.
#
# Project is analysed by SonarCloud. This file documents the analysis scope so
# the gate stays focused on the installable package + its tests, mirroring the
# ruff per-file-ignore policy already encoded in pyproject.toml.

sonar.projectKey=Integration-Automation_AutoPaperToPPT
sonar.organization=integration-automation

# Exclude one-shot developer / regen utility scripts from analysis. These are
# branchy find/replace + prose-editing helpers (docx / pptx rewriting, fixture
# regen, the already-run source-migration script) that are NOT shipped in the
# wheel and are already exempted from ruff via the `scripts/**` per-file-ignores
# (E501, C901, N806, S112, S603) in pyproject.toml. Their adjacent-string-literal
# prose blocks (S5799), domain identifiers like pPr / rPr (S117), and the
# fixed-allowlist `git mv` subprocess paths (S2083 / S603) are intentional for
# that throwaway tooling and would only add noise to the quality gate.
sonar.exclusions=scripts/**

# Test doubles legitimately have `async def` without `await`: the source / MCP /
# CLI tests monkeypatch async production functions (get_client, run_search,
# shutdown_clients) with async stand-ins that contain no await. Removing `async`
# would break the `await` contract in the code under test, so S7503 is a false
# positive inside tests/.
sonar.issue.ignore.multicriteria=async_doubles
sonar.issue.ignore.multicriteria.async_doubles.ruleKey=python:S7503
sonar.issue.ignore.multicriteria.async_doubles.resourceKey=tests/**
